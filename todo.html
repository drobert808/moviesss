<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@300;400&display=swap"
        rel="stylesheet">

    <!-- ============================================================
  SETUP INSTRUCTIONS (one-time, ~5 minutes)
  ============================================================
  1. Go to https://console.firebase.google.com → open your project
  2. Left sidebar: Build → Authentication → Get started
       → Sign-in method → Email/Password → Enable → Save
  3. Still in Authentication → Users tab → Add user
       → enter your email and a password → Add user
       (This creates YOUR login — only you can sign in)
  4. Left sidebar: Build → Firestore Database (already done)
  5. Firestore → Rules tab → make sure you have:
       rules_version = '2';
       service cloud.firestore {
         match /databases/{database}/documents {
           match /users/{userId}/items/{item} {
             allow read, write: if request.auth.uid == userId;
           }
         }
       }
       → Publish
  6. Project settings (gear icon) → Your apps → firebaseConfig
  7. Paste your config values in the CONFIG section below
  ============================================================ -->

    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #faf8f3;
            --check: #2d6a4f;
            --line: #c8c2b4;
            --divider: #aaa49a;
            --hover: #f0ece2;
            --error: #b94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #e8e3d8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Source Sans 3', sans-serif;
            padding: 2rem;
        }

        /* ---- Login screen ---- */
        #login-screen {
            background: var(--paper);
            width: 320px;
            border-radius: 2px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .10), 0 16px 40px rgba(0, 0, 0, .08);
            padding: 2.5rem 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #login-screen h1 {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--divider);
            margin-bottom: .2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }

        .field label {
            font-size: .75rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--divider);
        }

        .field input {
            font-family: 'Source Sans 3', sans-serif;
            font-size: .92rem;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--line);
            padding: .35rem 0;
            outline: none;
            transition: border-color .15s;
        }

        .field input:focus {
            border-bottom-color: var(--ink);
        }

        #login-btn {
            margin-top: .4rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 2px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: .88rem;
            letter-spacing: .06em;
            padding: .6rem 1rem;
            cursor: pointer;
            transition: opacity .15s;
        }

        #login-btn:hover {
            opacity: .85;
        }

        #login-btn:disabled {
            opacity: .4;
            cursor: default;
        }

        #login-error {
            font-size: .8rem;
            color: var(--error);
            min-height: 1em;
            display: none;
        }

        #setup-warning {
            background: #fff8e1;
            border: 1px solid #f0c040;
            border-radius: 4px;
            padding: .8rem 1rem;
            font-size: .82rem;
            color: #7a6010;
            line-height: 1.5;
        }

        #setup-warning strong {
            display: block;
            margin-bottom: .2rem;
        }

        /* ---- App ---- */
        #app {
            display: none;
        }

        .page {
            background: var(--paper);
            width: 360px;
            border-radius: 2px;
            box-shadow:
                0 1px 1px rgba(0, 0, 0, .06),
                0 4px 12px rgba(0, 0, 0, .10),
                0 16px 40px rgba(0, 0, 0, .08),
                inset 0 0 0 1px rgba(0, 0, 0, .04);
            padding: 2.5rem 2.5rem 2rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.4rem;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--divider);
        }

        #signout-btn {
            background: none;
            border: none;
            font-family: 'Source Sans 3', sans-serif;
            font-size: .75rem;
            color: var(--divider);
            cursor: pointer;
            padding: .2rem .4rem;
            border-radius: 3px;
            transition: background .12s, color .12s;
        }

        #signout-btn:hover {
            background: var(--hover);
            color: var(--ink);
        }

        .checklist {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: .1rem;
        }

        .checklist li {
            display: flex;
            align-items: center;
            gap: .65rem;
            padding: .4rem .4rem;
            border-radius: 4px;
            transition: background .12s ease;
            position: relative;
        }

        .checklist li:hover {
            background: var(--hover);
        }

        .checklist li:hover .delete-btn {
            opacity: 1;
        }

        .checklist li input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border: 1.5px solid var(--ink);
            border-radius: 2px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            transition: background .15s, border-color .15s;
        }

        .checklist li input[type="checkbox"]:checked {
            background: var(--check);
            border-color: var(--check);
        }

        .checklist li input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 0px;
            width: 4px;
            height: 8px;
            border: 2px solid #fff;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        .item-label {
            font-size: .92rem;
            color: var(--ink);
            line-height: 1.3;
            flex: 1;
            outline: none;
            border: none;
            background: transparent;
            font-family: 'Source Sans 3', sans-serif;
            cursor: text;
            padding: 0;
            min-width: 0;
        }

        .item-label:focus {
            border-bottom: 1px solid var(--divider);
        }

        .item-label.done {
            text-decoration: line-through;
            color: var(--divider);
        }

        .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--divider);
            font-size: 1rem;
            line-height: 1;
            padding: 0 2px;
            transition: color .12s, opacity .12s;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            color: var(--error);
        }

        .add-row {
            display: flex;
            align-items: center;
            gap: .65rem;
            margin-top: .6rem;
            padding: .4rem .4rem;
            border-radius: 4px;
            transition: background .12s;
        }

        .add-row:hover {
            background: var(--hover);
        }

        .add-icon {
            width: 15px;
            height: 15px;
            border: 1.5px dashed var(--divider);
            border-radius: 2px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--divider);
            font-size: .8rem;
            line-height: 1;
        }

        #new-item-input {
            font-size: .92rem;
            color: var(--ink);
            font-family: 'Source Sans 3', sans-serif;
            border: none;
            background: transparent;
            outline: none;
            flex: 1;
            padding: 0;
        }

        #new-item-input::placeholder {
            color: var(--divider);
            font-style: italic;
        }

        #new-item-input:focus {
            border-bottom: 1px solid var(--divider);
        }

        #sync-status {
            font-size: .72rem;
            color: var(--divider);
            text-align: right;
            margin-top: .8rem;
            min-height: 1em;
        }
    </style>
</head>

<body>

    <!-- Login screen -->
    <div id="login-screen">
        <h1>Tasks</h1>
        <div id="setup-warning" style="display:none">
            <strong>⚠ Firebase not configured</strong>
            Open this file in a text editor and follow the SETUP INSTRUCTIONS at the top.
        </div>
        <div class="field">
            <label for="email-input">Email</label>
            <input type="email" id="email-input" autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="field">
            <label for="password-input">Password</label>
            <input type="password" id="password-input" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div id="login-error"></div>
        <button id="login-btn">Sign in</button>
    </div>

    <!-- App -->
    <div id="app">
        <div class="page">
            <div class="page-header">
                <h1>Tasks</h1>
                <button id="signout-btn">Sign out</button>
            </div>
            <ul class="checklist" id="checklist"></ul>
            <div class="add-row">
                <div class="add-icon">+</div>
                <input type="text" id="new-item-input" placeholder="Add a task…">
            </div>
            <div id="sync-status"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        // ============================================================
        // YOUR FIREBASE CONFIG — paste values from Firebase console
        // ============================================================
        const firebaseConfig = {
                apiKey: "AIzaSyBQ1_mLwv2tvXZX-OavPdqVwxCxPhL26cU",
                authDomain: "movieparadise-15c80.firebaseapp.com",
                projectId: "movieparadise-15c80",
                storageBucket: "movieparadise-15c80.firebasestorage.app",
                messagingSenderId: "72091916572",
                appId: "1:72091916572:web:986dc85bf345fca52f02d9"
            };
        // ============================================================

        const isConfigured = !Object.values(firebaseConfig).some(v => v.startsWith('PASTE_'));

        if (!isConfigured) {
            document.getElementById('setup-warning').style.display = 'block';
            document.getElementById('login-btn').disabled = true;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let unsubscribe = null;
        let uid = null;

        // ---- Login ----
        const loginBtn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        loginBtn.addEventListener('click', async () => {
            if (!isConfigured) return;
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) { showError('Please enter your email and password.'); return; }
            loginBtn.disabled = true;
            errorEl.style.display = 'none';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (e) {
                loginBtn.disabled = false;
                if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') {
                    showError('Incorrect email or password.');
                } else {
                    showError('Sign in failed. Check your connection.');
                }
            }
        });

        // Allow pressing Enter in password field to submit
        document.getElementById('password-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') loginBtn.click();
        });

        document.getElementById('signout-btn').addEventListener('click', () => {
            if (unsubscribe) unsubscribe();
            signOut(auth);
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                uid = user.uid;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                startSync();
            } else {
                uid = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
                document.getElementById('checklist').innerHTML = '';
                loginBtn.disabled = false;
                if (unsubscribe) { unsubscribe(); unsubscribe = null; }
            }
        });

        // ---- Firestore sync ----
        function itemsRef() { return collection(db, 'users', uid, 'items'); }

        function setStatus(msg) { document.getElementById('sync-status').textContent = msg; }

        function startSync() {
            const q = query(itemsRef(), orderBy('order'));
            unsubscribe = onSnapshot(q, snapshot => {
                document.getElementById('checklist').innerHTML = '';
                snapshot.forEach(docSnap => {
                    const d = docSnap.data();
                    renderItem(docSnap.id, d.text, d.checked);
                });
                setStatus('');
            }, err => {
                setStatus('⚠ Could not load — check Firestore rules');
                console.error(err);
            });
        }

        async function saveItem(id, text, checked, order) {
            setStatus('Saving…');
            try {
                await setDoc(doc(db, 'users', uid, 'items', id), { text, checked, order });
                setStatus('Saved ✓');
                setTimeout(() => setStatus(''), 1500);
            } catch (e) { setStatus('⚠ Save failed'); console.error(e); }
        }

        async function removeItem(id) {
            setStatus('Saving…');
            try {
                await deleteDoc(doc(db, 'users', uid, 'items', id));
                setStatus('Saved ✓');
                setTimeout(() => setStatus(''), 1500);
            } catch (e) { setStatus('⚠ Save failed'); console.error(e); }
        }

        // ---- Render ----
        function renderItem(id, text, checked) {
            const li = document.createElement('li');
            li.dataset.id = id;

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = checked;

            const label = document.createElement('span');
            label.className = 'item-label' + (checked ? ' done' : '');
            label.contentEditable = 'true';
            label.textContent = text;
            label.setAttribute('spellcheck', 'false');

            cb.addEventListener('change', () => {
                label.classList.toggle('done', cb.checked);
                saveItem(id, label.textContent, cb.checked, getOrder(li));
            });

            label.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); label.blur(); }
            });

            label.addEventListener('blur', () => {
                saveItem(id, label.textContent, cb.checked, getOrder(li));
            });

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.textContent = '×';
            del.addEventListener('click', () => { li.remove(); removeItem(id); });

            li.appendChild(cb);
            li.appendChild(label);
            li.appendChild(del);
            document.getElementById('checklist').appendChild(li);
        }

        function getOrder(li) {
            return [...document.querySelectorAll('#checklist li')].indexOf(li);
        }

        // ---- Add item ----
        const input = document.getElementById('new-item-input');
        input.addEventListener('keydown', async e => {
            if (e.key !== 'Enter') return;
            const val = input.value.trim();
            if (!val) return;
            input.value = '';
            const id = 'item-' + Date.now();
            const order = document.querySelectorAll('#checklist li').length;
            await saveItem(id, val, false, order);
        });
    </script>
</body>

</html>
